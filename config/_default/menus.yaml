# Navigation Links
#   To link a homepage widget, specify the URL as a hash `#` followed by the filename of the
#     desired widget in your `content/home/` folder.
#   The weight parameter defines the order that the links will appear in.

main:
  - name: Home
    url: '#about'
    weight: 10
  - name: Projects
    url: '#projects'
    weight: 20
  - name: People
    url: '#people'
    weight: 30
  - name: Publications
    url: '#featured'
    weight: 40
  - name: News
    url: '#posts'
    weight: 50
  - name: Join Us
    url: '#join_us'
    weight: 53
  - name: Contact
    url: '#contact'
    weight: 56
  - name: Support Us
    url: '#support_us'
    weight: 60

